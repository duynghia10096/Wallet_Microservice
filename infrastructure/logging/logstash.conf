# Logstash configuration for Wallet Platform
# Receives logs from Filebeat and sends to Elasticsearch

input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON logs
  json {
    source => "message"
    remove_field => ["message"]
  }

  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Extract service name from log file path
  grok {
    match => { "source" => "/var/log/wallet/%{DATA:service_name}-service\.log" }
  }

  # If service_name not extracted, try other patterns
  if ![service_name] {
    grok {
      match => { "source" => "%{DATA}/logs/%{DATA:service_name}-service\.log" }
    }
  }

  # Set default service name if not found
  if ![service_name] {
    mutate {
      add_field => { "service_name" => "unknown" }
    }
  }

  # Add environment info
  mutate {
    add_field => {
      "environment" => "development"
      "platform" => "wallet-microservices"
    }
  }

  # Clean up fields
  mutate {
    remove_field => ["host", "agent", "ecs", "@version", "input", "log", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://52.5.211.130:9200"]
    user => "elastic"
    password => "changeme"
    index => "wallet-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
    ssl => false
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}